name: MLOPS ASSIGNMENT 2

on:
  push:
    branches: [ main ]

jobs:
    train:
        runs-on: ubuntu-latest

        env:
            AWS_DEFAULT_REGION: us-east-1

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: |
                pip install --upgrade pip
                pip install -r requirements.txt

            - name: Configure AWS
              run: |
                aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws configure set default.region $AWS_DEFAULT_REGION

            - name: DVC Pull
              run: |
                dvc pull

            - name: Set DagsHub credentials
              run: |
                echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
                echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

            - name: Train model
              run: |
                python train.py

            - name: Show metrics in summary
              run: |
                echo "NAME: ARJUN SREENIVAS" >> $GITHUB_STEP_SUMMARY
                echo "ROLL NO: 2022BCS0060" >> $GITHUB_STEP_SUMMARY
                echo "## Model Metrics" >> $GITHUB_STEP_SUMMARY
                cat output/metrics.json >> $GITHUB_STEP_SUMMARY

            - name: Upload metrics
              uses: actions/upload-artifact@v4
              with:
                name: trained_model
                path: output/
    
    deploy:
        runs-on: ubuntu-latest
        needs: train

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Download previous metrics
              uses: actions/download-artifact@v4
              with:
                name: trained_model
                path: output/

            - name: Docker Login
              run: |
                echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        
            - name: Build Docker image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/churn:latest .

            - name: Push Docker image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/churn:latest